<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim{
            color: red;
        }
        .cornao{
            color: grey;
        }
    </style>
</head>
<body>
    <input type="text" id="fruta" placeholder="digite o nome do novo item">
    <select name="" id="">
<option value="">Selecione</option>
<option value="corsim" class="corsim">CorSim</option>
<option value="corsim" class="cornao">CorNao</option>

    </select>
    
    <button onclick="CadastrarFrutas()">Cadastrar</button>

    <h1>Frutas</h1>

    <ul id="ListaFrutas">
        <li class="corsim"> Amora</li>
      
    </ul>

    <script>
        function CadastrarFrutas() {
            //retorna todos os elementos com a class name "fruta"
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const ListaFrutas = document.getElementById("ListaFrutas");
            
            if (fruta.trim().length == 0 || nomeClasse.length == 0) {
                alert("preencha todos os campos: fruta e nome de classe");
                return false;
            }
            
            ListaFrutas.innerHTML += `<li class="${nomeClasse}">${fruta}</li>`;
            
                
            }

    </script>
</body>
</html>
