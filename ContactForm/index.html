
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
   <header class="header">
    <div class="container container--flex-column">  
        <img class="header__logo" src="./images/Vector.svg" alt="">
        <h1 class="header__title">Contact Form</h1>
        <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
    </div>
   </header>
   <main>
    <div class="container"> 
        <form class="contact-form" action="">
            <div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for="nome">Nome</label></div>
<div class="contact-form__col-b">

<input class="contact-form__input contact-form__input--metade" name="Nome" id="Nome" placeholder="nome" type="text">
<input class="contact-form__input contact-form__input--metade" name="Sobrenome" id="Sobrenome" placeholder="Sobrenome" type="text">
</div>
            </div>


<div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for="Email">Email</label></div>

<div class="contact-form__col-b">
    <input class="contact-form__input contact-form__input--inteiro" name="Email" id="Email" placeholder="Email" type="text">
</div>
</div>

<div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for="Telefone">Telefone</label></div>

<div class="contact-form__col-b">
    <input class="contact-form__input contact-form__input--terco" name="paisnumero" id="paisnumero" placeholder="+55" type="text">
    <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd" placeholder="ddd" type="text">
    <input class="contact-form__input contact-form__input--terco" name="exemplo" id="exemplo" placeholder="ex: 88888888" type="text">
</div>
</div>

<div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for="Endereço">Endereço</label></div>

<div class="contact-form__col-b">
    <input class="contact-form__input contact-form__input--quarto" 
         name="cep" 
         id="cep" 
         placeholder="cep: 88888-8888" 
         type="number"
         onblur="buscarEndereco(this.value)"
    >

    <input class="contact-form__input contact-form__input--metade" name="rua" id="rua" placeholder="Rua da sua casa" type="text">
    <input class="contact-form__input contact-form__input--terco" name="numero" id="numero" placeholder="ex:707" type="text">
</div>
</div>


    <div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for=""></label></div>

<div class="contact-form__col-b">
     <input class="contact-form__input contact-form__input--terco" name="apt" id="apt" placeholder="apt: bloco 21" type="text">
     <input class="contact-form__input contact-form__input--terco" name="bairro" id="bairro" placeholder="Bairro" type="text">
     <input class="contact-form__input contact-form__input--terco" name="Cidade" id="Cidade" placeholder="Cidade" type="text">
</div>
</div>

     <div class="contact-form__linha">
<div class="contact-form__col-a"><label  class="contact-form__label" for=""></label></div>
<div class="contact-form__col-b">
     <input class="contact-form__input contact-form__input--terco" name="Estado" id="Estado" placeholder="Estado" type="text">
</div>
</div>

<div class="contact-form__linha">
<div class="contact-form__col-a">
<label class="contact-form__label" for="AP">Anotações</label>
</div>

<div class="contact-form__col-b">
<textarea class="Textarea" name="Message" id="" placeholder="Escreva Algo"></textarea>
</div>
</div>

<!-- botao -->
 <div class="contact-form__linha">
<div class="contact-form__col-a">
</div>
<div class="contact-form__col-b">
<button type="button" name="cadastrar" id="cadastrar" class="contact-form__button  contact-form__input--metade" onclick="validarFormulario();">cadastrar</button>
<input type="reset" name="reset" id="reset" value="limpar" class="contact-form__button  contact-form__input--metade">
</div>
</div>
        </form>
    </div>
   </main>
  <script src="js/scripts.js"></script>
</body>
</html>
